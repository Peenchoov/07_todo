{% extends "base.html" %}
{% load static %}

{% block title %}PLAYER 2 - Sign Up{% endblock title %}

{% block content %}
<div class="flex flex-col items-center justify-start pt-10 md:pt-16 px-4 min-h-[calc(100vh-120px)]">
    
    <div class="bg-white border-4 border-lifeos-text p-6 md:p-10 shadow-[8px_8px_0px_0px_#4d0057] w-full max-w-md">
        
        <h1 class="text-xl md:text-2xl text-center mb-8 drop-shadow-[2px_2px_0px_#4d0057] text-lifeos-accent1">
            PLAYER 2<br>
            <span class="text-[10px] text-lifeos-text drop-shadow-none leading-loose">(SIGN UP)</span>
        </h1>

        <form method="post" class="text-[10px] md:text-xs leading-loose 
            [&_input]:border-4 [&_input]:border-lifeos-text [&_input]:p-3 [&_input]:w-full [&_input]:mb-4 [&_input]:bg-lifeos-bg/20 [&_input]:focus:outline-none [&_input]:focus:bg-lifeos-accent3/20 
            [&_label]:block [&_label]:mb-2 
            [&_p]:mb-4 
            [&_.helptext]:text-[8px] [&_.helptext]:block [&_.helptext]:mt-1 [&_.helptext]:opacity-70 
            [&_.errorlist]:text-red-500 [&_.errorlist]:mb-2">
            
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="w-full bg-lifeos-accent1 text-lifeos-text border-4 border-lifeos-text px-4 py-4 mt-4 shadow-[6px_6px_0px_0px_#4d0057] hover:translate-y-1 hover:translate-x-1 hover:shadow-none transition-all">
                JOIN GAME
            </button>
        </form>
        
        <div class="text-center mt-8 text-[10px]">
            ALREADY HAVE AN ACCOUNT?<br><br>
            <a href="{% url 'login' %}" class="hover:text-lifeos-accent1 transition-colors border-b-2 border-transparent hover:border-lifeos-accent1 pb-1">
                LOG IN HERE
            </a>
        </div>
    </div>
</div>
{% endblock content %}
